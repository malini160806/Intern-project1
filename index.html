<!DOCTYPE html>
<html>
<head>
     <title>DuckDuckGo</title>
     <link rel="icon" href="duckgo.png">
     <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="topbar">
    <div class="left">
      <img src="duckgo.png">
      <div>DuckDuckGo</div>
    </div>

    <div class="right">
      <div class="duckai">💬 Duck.ai</div>
      <div class="menu">☰</div>
    </div>
   </div>


  <div class="search-container">
    <input type="text" placeholder="Search privately">
    <button class="btn">🔍 Search</button>
    <button class="btn">✨ Ask AI</button>
  </div>

  <div class="hero">
   <h1> Switch to DuckDuckGo.
    It's private and free!</h1>
  </div>

 <div class="cards">
  <div class="card">
    <img src="search.svg" alt="serach icon">
    <p>Make DuckDuckGo your default search engine</p>
    <button card button>Set As Default Search</button>
  </div>

  <div class="card">
    <div class="badge">BEST PRIVACY</div>
    <img src="duck2.svg" alt="serach icon">
    <p>Get our free browser for even more privacy</p>
    <button class="card button blue">Download browser -></button>
  </div>
 </div>
   <p class="footer-text">Trusted by tens of millions worlwide!</p>

</body>
</html>
